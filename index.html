<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbeIA - Portal de Inteligência Urbana</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f6f9; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 15px; }
        button:hover { background-color: #0056b3; }
        input { margin: 15px 0; width: 100%; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚨 UrbeIA</h2>
    <p>Reportar Ocorrência Urbana em Tempo Real</p>
    
    <input type="file" id="fotoInput" accept="image/*">
    <button onclick="dispararFluxoUrbeIA()">Enviar Alerta com GPS</button>

    <div id="status"></div>
</div>

<script>
    async function dispararFluxoUrbeIA() {
        const fotoInput = document.getElementById('fotoInput');
        const statusDiv = document.getElementById('status');
        
        if (fotoInput.files.length === 0) {
            alert("Por favor, tire ou selecione uma foto antes de enviar.");
            return;
        }

        statusDiv.innerHTML = "📍 Solicitando autorização do GPS...";

        // 1. Acessa o GPS do smartphone do usuário
        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            statusDiv.innerHTML = "⏳ Conectando à UrbeIA na nuvem...";

            // 2. Prepara o pacote de dados (Multipart Form Data)
            const formData = new FormData();
            formData.append("file", fotoInput.files[0]);
            formData.append("latitude", lat);
            formData.append("longitude", lng);

            try {
                // 3. Dispara diretamente para o seu motor no Google Cloud Run
                const response = await fetch("https://urbeia-cloudrun-swct4vyilq-ew.a.run.app/analisar", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Erro na resposta do servidor.");

                const resultado = await response.json();
                
                // 4. Exibe o veredito na tela do celular
                statusDiv.innerHTML = `✅ Sucesso!<br>Detected: <b>${resultado.objeto_detectado}</b> (${resultado.confianca_percentual}%)<br>Telegram Notificado! 🚀`;
            } catch (erro) {
                statusDiv.innerHTML = "❌ Erro ao processar dados no servidor.";
                console.error(erro);
            }

        }, (error) => {
            statusDiv.innerHTML = "❌ Permissão de GPS negada. Ative a localização no seu celular.";
            alert("Para funcionar, o portal precisa que você autorize o uso do GPS.");
        });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbeIA - Portal do Munícipe (Volta Redonda)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 420px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { color: #007bff; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        /* Estilização dos Botões */
        button { border: none; padding: 14px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.2s; }
        .btn-foto { background-color: #007bff; color: white; margin-bottom: 8px; }
        .btn-foto:hover { background-color: #0056b3; }
        .btn-enviar { background-color: #28a745; color: white; margin-top: 15px; }
        .btn-enviar:hover { background-color: #218838; }
        
        /* Feedback de arquivo anexado */
        .status-foto { font-size: 13px; color: #666; margin-bottom: 20px; font-style: italic; }
        
        #status { margin-top: 25px; font-size: 15px; line-height: 1.6; }
        .relatorio-box { text-align: left; background: #f8f9fa; padding: 18px; border-radius: 8px; border-left: 5px solid #28a745; margin-top: 15px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .relatorio-box p { margin: 8px 0; font-size: 14px; }
        .status-aberto { color: #d97706; font-weight: bold; background: #fef3c7; padding: 2px 6px; border-radius: 4px; }
        .alerta-box { text-align: center; background: #fff7ed; padding: 18px; border-radius: 8px; border-left: 5px solid #ea580c; margin-top: 15px; color: #c2410c; font-size: 14px; font-weight: 500; }
        .foto-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 6px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h2>🚨 UrbeIA</h2>
    <div class="subtitle">Zeladoria Urbana de Volta Redonda</div>
    
    <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display: none;" onchange="atualizarFeedbackFoto()">
    
    <button class="btn-foto" onclick="document.getElementById('fotoInput').click()">📸 Tirar Foto</button>
    <div id="feedbackFoto" class="status-foto">Nenhuma foto capturada</div>
    
    <button class="btn-enviar" onclick="dispararFluxoUrbeIA()">Enviar Reclamação</button>

    <div id="status"></div>
</div>

<script>
    // Função para avisar o usuário que a foto foi registrada com sucesso
    function atualizarFeedbackFoto() {
        const input = document.getElementById('fotoInput');
        const feedback = document.getElementById('feedbackFoto');
        if (input.files.length > 0) {
            feedback.innerHTML = "✅ Foto capturada com sucesso!";
            feedback.style.color = "#28a745";
            feedback.style.fontWeight = "bold";
        }
    }

    async function dispararFluxoUrbeIA() {
        const fotoInput = document.getElementById('fotoInput');
        const statusDiv = document.getElementById('status');
        
        if (fotoInput.files.length === 0) {
            alert("Por favor, capture uma foto da ocorrência antes de enviar.");
            return;
        }

        statusDiv.innerHTML = "<span style='color: #666;'>📍 Obtendo coordenadas do GPS...</span>";

        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            statusDiv.innerHTML = "<span style='color: #007bff;'>⏳ Processando imagem e validando território...</span>";

            const formData = new FormData();
            formData.append("file", fotoInput.files[0]);
            formData.append("latitude", lat);
            formData.append("longitude", lng);

            try {
                const response = await fetch("https://urbeia-cloudrun-swct4vyilq-ew.a.run.app/analisar", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Erro na resposta do servidor.");

                const resultado = await response.json();
                
                if (resultado.status_requisicao === "Fora do Limite") {
                    statusDiv.innerHTML = `
                        <div class="alerta-box">
                            ⚠️ <b>Limite Territorial Rejeitado</b><br><br>
                            ${resultado.mensagem}
                        </div>
                    `;
                    return;
                }
                
                const urlFotoLocal = URL.createObjectURL(fotoInput.files[0]);
                
                statusDiv.innerHTML = `
                    <div class="relatorio-box">
                        <h4 style="color: #28a745; margin-top: 0; margin-bottom: 15px; text-align: center;">✅ Reclamação Registrada!</h4>
                        
                        <img src="${urlFotoLocal}" class="foto-preview" alt="Evidência Urbana">

                        <p><b>📄 Protocolo:</b> <code>${resultado.protocolo}</code></p>
                        <p><b>🔍 Análise Visual:</b> ${resultado.ia_insights.alvo}</p>
                        <p><b>📊 Grau de Certeza:</b> ${resultado.ia_insights.certeza}</p>
                        <p><b>🏛️ Encaminhado:</b> ${resultado.encaminhado_para}</p>
                        <p><b>💼 Status:</b> <span class="status-aberto">${resultado.status_chamado}</span></p>
                        <p><b>📍 Endereço:</b> <span style="font-size: 13px; color: #555;">${resultado.endereco_identificado}</span></p>
                    </div>
                    <p style="color: #155724; font-size: 13px; font-weight: bold; margin-top: 15px;">🚀 Central de Volta Redonda Notificada!</p>
                `;

            } catch (erro) {
                statusDiv.innerHTML = "<span style='color: #dc3545; font-weight: bold;'>❌ Erro ao processar dados no servidor da UrbeIA.</span>";
                console.error(erro);
            }

        }, (error) => {
            statusDiv.innerHTML = "<span style='color: #dc3545; font-weight: bold;'>❌ Permissão de GPS necessária.</span>";
            alert("A UrbeIA precisa do GPS para garantir que o chamado pertence a Volta Redonda.");
        });
    }
</script>

</body>
</html>

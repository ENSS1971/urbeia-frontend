<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbeIA - Acesso Restrito Backoffice</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-box { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h3 { color: #1e3a8a; margin-top: 0; text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 25px; }
        
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; color: #334155; }
        select, input[type="password"], input[type="text"] { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        select { background: white; cursor: pointer; }
        
        /* 📧 Caixa combinada para o E-mail Corporativo Fixo */
        .input-group-email { display: flex; align-items: center; margin-bottom: 16px; border: 1px solid #cbd5e1; border-radius: 6px; overflow: hidden; background: white; }
        .input-group-email input { flex: 1; border: none; padding: 12px; font-size: 14px; outline: none; background: transparent; margin-bottom: 0; }
        .email-sufixo { background-color: #f1f5f9; color: #475569; padding: 12px 14px; font-size: 13px; font-weight: 600; border-left: 1px solid #cbd5e1; user-select: none; white-space: nowrap; }
        
        button { background-color: #1e3a8a; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s; margin-top: 5px; }
        button:hover { background-color: #1d4ed8; }
        .alternar-link { display: block; text-align: center; margin-top: 18px; font-size: 13px; color: #2563eb; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<!-- CAIXA 1: FORMULÁRIO DE LOGIN -->
<div class="login-box" id="caixaLogin">
    <h3>🏛️ UrbeIA Backoffice</h3>
    <div class="subtitle">Acesso restrito para fiscais e secretarias</div>
    
    <label>Usuário Corporativo:</label>
    <div class="input-group-email">
        <input type="text" id="usuarioLogin" placeholder="ex: eduardo.sepulveda">
        <div class="email-sufixo">@voltaredonda.rj.gov.br</div>
    </div>
    
    <label>Senha de Acesso:</label>
    <input type="password" id="senhaLogin" placeholder="••••••••">
    
    <button onclick="executarLogin()">Entrar no Painel</button>
    
    <span class="alternar-link" onclick="alternarAbas(true)">Criar nova conta de Fiscal</span>
</div>

<!-- CAIXA 2: FORMULÁRIO DE CADASTRO -->
<div class="login-box" id="caixaCadastro" style="display: none;">
    <h3>📋 Cadastro de Colaborador</h3>
    <div class="subtitle">Insira os dados do novo agente municipal</div>
    
    <label>Nome Completo:</label>
    <input type="text" id="nomeCad" placeholder="Nome do Agente">

    <label>Definir Usuário de E-mail:</label>
    <div class="input-group-email">
        <input type="text" id="usuarioCad" placeholder="ex: nome.sobrenome">
        <div class="email-sufixo">@voltaredonda.rj.gov.br</div>
    </div>
    
    <label>Senha Provisória:</label>
    <input type="password" id="senhaCad" placeholder="Mínimo 6 caracteres">

    <label>Cargo / Nível de Acesso:</label>
    <select id="cargoCad" onchange="ajustarExibicaoSecretaria()">
        <option value="Fiscal">Fiscal Técnico de Campo</option>
        <option value="Secretario">Secretário Municipal de Pasta</option>
        <option value="Vice-Prefeito">Vice-Prefeito</option>
        <option value="Prefeito">Prefeito Municipal</option>
    </select>

    <div id="divSecretariaCad">
        <label>Secretaria / Lotação:</label>
        <select id="secretariaCad">
            <option value="Todas">Ouvidoria Geral (Vê Tudo)</option>
            <option value="Secretaria de Infraestrutura e Servicos Urbanos">Infraestrutura e Serviços Urbanos</option>
            <option value="Secretaria de Trânsito e Mobilidade Urbana">Trânsito e Mobilidade Urbana</option>
            <option value="Secretaria de Meio Ambiente e Protecao Animal">Meio Ambiente e Proteção Animal</option>
        </select>
    </div>
    
    <button onclick="executarCadastro()">Cadastrar Agente</button>
    
    <span class="alternar-link" onclick="alternarAbas(false)">Voltar para a tela de Login</span>
</div>

<script>
    const API_URL = "https://urbeia-cloudrun-swct4vyilq-ew.a.run.app";
    // 🔒 Definição do domínio oficial e fixo de Volta Redonda
    const DOMINIO_MUNICIPAL = "@voltaredonda.rj.gov.br";

    function alternarAbas(mostrarCadastro) {
        document.getElementById('caixaLogin').style.display = mostrarCadastro ? 'none' : 'block';
        document.getElementById('caixaCadastro').style.display = mostrarCadastro ? 'block' : 'none';
    }

    // Oculta dinamicamente a secretaria se o cargo for da Gestão Executiva Majoritária
    function ajustarExibicaoSecretaria() {
        const cargo = document.getElementById('cargoCad').value;
        const divSec = document.getElementById('divSecretariaCad');
        if (cargo === "Prefeito" || cargo === "Vice-Prefeito") {
            divSec.style.display = 'none';
        } else {
            divSec.style.display = 'block';
        }
    }

    async function executarCadastro() {
        const nome = document.getElementById('nomeCad').value.trim();
        const usuario = document.getElementById('usuarioCad').value.trim().toLowerCase();
        const senha = document.getElementById('senhaCad').value;
        const cargo = document.getElementById('cargoCad').value;
        
        // Se for Prefeito ou Vice, o escopo de visualização padrão enviado é "Todas"
        const secretaria = (cargo === "Prefeito" || cargo === "Vice-Prefeito") ? "Todas" : document.getElementById('secretariaCad').value;

        if (!nome || !usuario || !senha) { alert("Preencha todos os campos."); return; }

        // Concatena o domínio cinza fixo ao usuário antes do envio
        const emailInstitucionalCompleto = usuario + DOMINIO_MUNICIPAL;

        const formData = new FormData();
        formData.append("nome", nome);
        formData.append("email", emailInstitucionalCompleto);
        formData.append("senha", senha);
        formData.append("secretaria", secretaria);
        formData.append("cargo", cargo); // ✅ Enviando o cargo mapeado

        try {
            const r = await fetch(`${API_URL}/admin/registrar-fiscal`, { method: "POST", body: formData });
            const res = await r.json();
            if (r.ok) {
                alert(`Usuário cadastrado com sucesso como ${cargo}!`);
                alternarAbas(false);
            } else { alert(res.detail || "Erro no cadastro."); }
        } catch (e) { alert("Erro de conexão."); }
    }

    async function ejecutarLogin() {
        const usuario = document.getElementById('usuarioLogin').value.trim().toLowerCase();
        const senha = document.getElementById('senhaLogin').value;

        if (!usuario || !senha) { alert("Preencha usuário e senha."); return; }
        const emailInstitucionalCompleto = usuario + DOMINIO_MUNICIPAL;

        const formData = new FormData();
        formData.append("email", emailInstitucionalCompleto);
        formData.append("senha", senha);

        try {
            const r = await fetch(`${API_URL}/admin/login`, { method: "POST", body: formData });
            const res = await r.json();
            
            if (r.ok) {
                // 💾 Persiste as chaves e os privilégios hierárquicos no navegador
                localStorage.setItem("urbeia_token", res.token_acesso);
                localStorage.setItem("urbeia_fiscal_nome", res.nome_fiscal);
                localStorage.setItem("urbeia_fiscal_sec", res.secretaria_fiscal);
                localStorage.setItem("urbeia_fiscal_cargo", res.cargo_fiscal); // ✅ Gravando o Cargo hierárquico
                
                window.location.href = "painel.html";
            } else { alert(res.detail || "Usuário ou senha incorretos."); }
        } catch (e) { alert("Erro de comunicação com o servidor."); }
    }
</script>
</body>
</html>
